<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moon Corridor Builder</title>
  <link rel="stylesheet" href="./styles.css?v=9">
</head>
<body>
  <div class="app-shell">
    <div id="viewport" aria-label="3D moonbase scene"></div>

    <div class="hud">
      <div class="title-block">
        <p class="eyebrow">Lunar Assembly</p>
        <h1>Moon Corridor Builder</h1>
      </div>
      <div class="hud-side">
        <div class="file-toolbar" aria-label="Scene file actions">
          <button id="save-scene" class="file-action" type="button" aria-label="Save scene" title="Save scene">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 4.5h11l3 3V19.5H5z" />
              <path d="M8 4.5v5h8v-5" />
              <path d="M8 19.5v-6h8v6" />
            </svg>
          </button>
          <button id="load-scene" class="file-action" type="button" aria-label="Load scene" title="Load scene">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3.5 8.5h6l2-2h9v11h-17z" />
              <path d="M12 10.5v6" />
              <path d="M9.5 14l2.5 2.5L14.5 14" />
            </svg>
          </button>
        </div>
        <div id="scene-status" class="scene-status">Loading moonbase modules...</div>
      </div>
    </div>

    <div class="instruction-chip">
      <span>WASD to move</span>
      <span>Left click select</span>
      <span>Right drag look</span>
      <span>Q/E rotate selected</span>
      <span>R/F raise or lower selected</span>
      <span>Delete removes selected</span>
    </div>

    <section class="picker-shell" aria-label="Moonbase model picker">
      <div class="picker-header">
        <div>
          <p class="eyebrow">Module Carousel</p>
        </div>
        <p class="picker-note">Scroll or use the arrows to browse every OBJ model.</p>
      </div>

      <div class="picker-frame">
        <button class="scroll-control" type="button" data-direction="-1" aria-label="Scroll models left">
          &#8592;
        </button>
        <div id="model-strip" class="model-strip" role="list"></div>
        <button class="scroll-control" type="button" data-direction="1" aria-label="Scroll models right">
          &#8594;
        </button>
      </div>
    </section>
  </div>

  <noscript>This page needs JavaScript enabled to render the 3D scene.</noscript>
  <input id="scene-file-input" type="file" accept=".json,application/json" hidden>
  <script type="module" src="./main.js?v=19"></script>
</body>
</html>
